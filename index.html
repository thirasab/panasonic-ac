<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Relay Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .card { background: white; max-width: 360px; margin: 30px auto; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-on { background-color: #2e7d32; color: white; }
        .btn-off { background-color: #c62828; color: white; }
        .btn:active { transform: scale(0.98); }
        #status { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #757575; }
        #ack-status { font-size: 15px; margin-bottom: 20px; color: #0288d1; font-weight: bold; padding: 10px; background: #e1f5fe; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>สวิตช์ควบคุม Relay (ESP32)</h2>
    <div id="status">MQTT: กำลังเชื่อมต่อ...</div>
    <div id="ack-status">สถานะ: รอข้อมูลจาก ESP32</div>

<!-- แก้ใหม่ -->
<button class="btn btn-on" onclick="sendCmd('OFF')">เปิดใช้งาน (ON)</button>
<button class="btn btn-off" onclick="sendCmd('ON')">ปิดใช้งาน (OFF)</button>
</div>

<script>
    // --- Config HiveMQ Cloud ---
    const broker = "4d79d42984154e37aab32ca068370f40.s1.eu.hivemq.cloud";
    const port = 8884; // พอร์ต WSS (WebSockets)
    const username = "esp32_user";
    const password = "Mcl19508";

    const topicSet = "home/ac/panasonic/set";
    const topicState = "home/ac/panasonic/state";
    const clientID = "Web_Relay_" + Math.floor(Math.random() * 1000000);

    const client = new Paho.MQTT.Client(broker, port, clientID);

    client.onConnectionLost = function (responseObject) {
        document.getElementById("status").innerText = "MQTT: หลุดการเชื่อมต่อ";
        document.getElementById("status").style.color = "red";
    };

    // เมื่อมีสัญญาณตอบกลับจาก ESP32
    client.onMessageArrived = function (message) {
        const payload = message.payloadString;
        const ackBox = document.getElementById("ack-status");
        
        if (payload === "ON_OK") {
            ackBox.innerText = "สถานะ: Relay เปิดทำงานแล้ว (ON)";
            ackBox.style.color = "#2e7d32";
            ackBox.style.background = "#e8f5e9";
        } else if (payload === "OFF_OK") {
            ackBox.innerText = "สถานะ: Relay ปิดทำงานแล้ว (OFF)";
            ackBox.style.color = "#c62828";
            ackBox.style.background = "#ffebee";
        } else if (payload === "ESP32_ONLINE") {
            ackBox.innerText = "สถานะ: ESP32 ออนไลน์พร้อมใช้งาน";
            ackBox.style.color = "#0288d1";
            ackBox.style.background = "#e1f5fe";
        }
    };

    client.connect({
        useSSL: true,
        userName: username,
        password: password,
        onSuccess: function () {
            document.getElementById("status").innerText = "MQTT: เชื่อมต่อ HiveMQ สำเร็จ";
            document.getElementById("status").style.color = "green";
            client.subscribe(topicState); // รอรับสถานะจาก ESP32
        },
        onFailure: function (e) {
            document.getElementById("status").innerText = "MQTT: ล้มเหลว (" + e.errorMessage + ")";
            document.getElementById("status").style.color = "red";
        }
    });

    function sendCmd(payload) {
        if (client.isConnected()) {
            const message = new Paho.MQTT.Message(payload);
            message.destinationName = topicSet;
            client.send(message);
            document.getElementById("ack-status").innerText = "กำลังส่งคำสั่ง...";
            document.getElementById("ack-status").style.color = "gray";
            document.getElementById("ack-status").style.background = "#f5f5f5";
        } else {
            alert("ยังไม่ได้เชื่อมต่อ MQTT Broker");
        }
    }
</script>

</body>
</html>
